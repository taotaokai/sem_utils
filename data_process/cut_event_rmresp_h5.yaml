stations_path: 'sample_data/stations/' # station xml files, net.sta.xml
SDS_root: 'sample_data/SDS/'

enforce_3comp: False # True: either Z12 or ZNE, False: either Z or Z12 or ZNE

# keep only one (loc, band) for each (net, sta)
# channel code = band + instrument + orientation
# NOTE: instrument code is fixed to 'H' and orientation codes are assumed to be Z,N,E or Z,1,2
zcomp_pattern: "[BH]HZ" # for matching files of Z component

# band_code_priority: ['H', 'B']
# location_code_priority: ['', '00', '01', '*']

time_window:
  # specify the at least and at most time before first arrival
  before_first_arrival: [250, 500] # sec
  # after_first_arrival_seconds: 1500 # sec
  # specify the at least & at most time after origin time
  after_origin_time: [1000, 1500] # sec

resample:
  sampling_rate: 2 # Hz, resample data
  filter: # butterworth, anti-aliasing (amp < 2e-5 at Nyquist freq. 1 Hz)
    type: 'lowpass'
    N: 15     # filter order
    Wn: 0.5   # cutoff frequency

remove_response:
  output_type: VEL #VEL # either DISP, VEL, ACC, DEF
  output_unit: meter #m/s # meter, m/s
  # to determine response passband: [resp_lc, resp_hc]
  ref_resp_type: VEL # type of response to determine corner freqs 
  ref_freq: 1 # Hz, reference frequency
  # response amplitude within [resp_lc, resp_hc] >= ref_amp * 10**(-1 * thred_dB/20)
  ref_threshold: 3.01 # dB, relative to the amplitude at ref_freq, -3.01 dB is about half power
  # instrument passband must cover [max_resp_lc, min_resp_hc]
  max_resp_lc: 0.05  # Hz, ensure enough low freq. content
  min_resp_hc: 1     # Hz, ensure enough high freq. content
  # pre-filter applied to stablizing division of instrument response at frequencies close to zero
  filter: # butterworth
    type: 'highpass'
    N: 2  # filter order, most broadband seismometers have 2 zero zeros in velocity response,
          # i.e. |H| ~ f^2 for f near 0
    min_cutoff_freq: 0.01  # Hz, minimum cutoff frequency, Wn = max(min_cutoff_freq, resp_lc)
